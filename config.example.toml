# Command Central Configuration
# Copy to config.toml and edit, or run: command_central setup

[llm]
provider = "openai"
api_key = ""
model = "gpt-4"
base_url = "https://api.openai.com/v1"

[discord]
token = ""
# channel_id = "123456789"  # Uncomment to restrict to one channel

[paths]
atomic_repo = "$HOME/Atomic"
opencode_bin = "$HOME/.opencode/bin/opencode"

# ────────────────────────────────────────────
